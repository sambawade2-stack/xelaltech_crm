{% extends 'base/base.html' %}

{% block title %}Réinitialiser le mot de passe — FinTrack CRM{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060f1e;">
  <div style="width:100%;max-width:420px;padding:20px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <i class="fas fa-key" style="color:white;font-size:20px;"></i>
      </div>
      <h1 style="font-size:22px;font-weight:800;color:#e2e8f0;margin:0 0 4px;">Mot de passe oublié</h1>
      <p style="font-size:13px;color:#64748b;margin:0;">Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>

    <div class="card" style="padding:28px;">
      <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;">Adresse email</label>
          <input type="email" name="email" required class="form-input" placeholder="votre@email.com" style="width:100%;box-sizing:border-box;">
        </div>
        <button type="submit" class="btn-primary" style="width:100%;padding:12px;justify-content:center;">
          Envoyer le lien de réinitialisation
        </button>
      </form>
      <p style="text-align:center;margin:16px 0 0;font-size:13px;color:#64748b;">
        <a href="{% url 'users:login' %}" style="color:#60a5fa;text-decoration:none;">Retour à la connexion</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
