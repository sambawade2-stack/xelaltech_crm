{% extends 'base/base.html' %}

{% block title %}Email envoyé — FinTrack CRM{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060f1e;">
  <div style="width:100%;max-width:420px;padding:20px;">
    <div class="card" style="padding:36px;text-align:center;">
      <div style="width:60px;height:60px;border-radius:50%;background:rgba(34,197,94,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i class="fas fa-envelope-open-text" style="font-size:24px;color:#22c55e;"></i>
      </div>
      <h2 style="font-size:20px;font-weight:700;color:#e2e8f0;margin:0 0 10px;">Email envoyé !</h2>
      <p style="font-size:13px;color:#94a3b8;margin:0 0 24px;">Si un compte existe avec cet email, vous recevrez un lien de réinitialisation dans les prochaines minutes.</p>
      <a href="{% url 'users:login' %}" class="btn-primary" style="display:inline-block;padding:10px 24px;">
        Retour à la connexion
      </a>
    </div>
  </div>
</div>
{% endblock %}
