<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — FinTrack CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { accent: '#2563EB', sidebar: '#081C3A' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="h-full bg-gray-50 flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-accent/30">
      <i class="fas fa-chart-line text-white text-xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">FinTrack <span class="text-accent">CRM</span></h1>
    <p class="text-gray-400 text-sm mt-1">Gestion financière professionnelle</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
    <h2 class="text-xl font-semibold text-gray-900 mb-1">Connexion</h2>
    <p class="text-gray-400 text-sm mb-6">Entrez vos identifiants pour accéder à votre espace</p>

    <form method="POST" action="{% url 'account_login' %}" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next|default:'/dashboard/' }}">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email ou nom d'utilisateur</label>
        <div class="relative">
          <input type="text" name="login" required autocomplete="username"
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-700
                        focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent transition-all"
                 placeholder="vous@exemple.com">
          <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
        <div class="relative">
          <input type="password" name="password" id="password" required autocomplete="current-password"
                 class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-700
                        focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent transition-all"
                 placeholder="••••••••">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <button type="button" onclick="togglePassword()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i id="toggleIcon" class="fas fa-eye text-sm"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="remember" class="rounded border-gray-300 text-accent focus:ring-accent">
          <span class="text-sm text-gray-600">Se souvenir de moi</span>
        </label>
      </div>

      <button type="submit"
              class="w-full py-2.5 bg-accent text-white font-semibold rounded-xl hover:bg-blue-700
                     transition-all duration-200 text-sm shadow-sm shadow-accent/30">
        Se connecter
      </button>
    </form>

  </div>

  <p class="text-center text-xs text-gray-400 mt-6">
    © 2026 FinTrack CRM · Tous droits réservés
  </p>
</div>
<script>
function togglePassword() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('toggleIcon');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    pw.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
</body>
</html>
