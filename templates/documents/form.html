{% extends 'base/base.html' %}
{% block page_title %}Uploader un document{% endblock %}
{% block content %}
<div class="max-w-xl">
  <div class="card p-6">
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Titre *</label>
        {{ form.title }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Fichier *</label>
        {{ form.file }}
        <p class="text-gray-400 text-xs mt-1">PDF, images, Word, Excel · Max 50MB</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Type de document</label>
        {{ form.document_type }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
        {{ form.description }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Tags</label>
        {{ form.tags }}
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn-primary"><i class="fas fa-upload text-xs"></i> Uploader</button>
        <a href="{% url 'documents:list' %}" class="btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
