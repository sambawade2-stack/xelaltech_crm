<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déconnexion — FinTrack CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { accent: '#2563EB', sidebar: '#081C3A' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="h-full bg-gray-50 flex items-center justify-center p-4">
<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-accent/30">
      <i class="fas fa-chart-line text-white text-xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">FinTrack <span class="text-accent">CRM</span></h1>
    <p class="text-gray-400 text-sm mt-1">Gestion financière professionnelle</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
    <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-right-from-bracket text-red-500 text-xl"></i>
    </div>
    <h2 class="text-xl font-semibold text-gray-900 mb-2">Se déconnecter</h2>
    <p class="text-gray-400 text-sm mb-6">Êtes-vous sûr(e) de vouloir vous déconnecter de votre espace ?</p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit"
              class="w-full py-2.5 bg-red-500 text-white font-semibold rounded-xl hover:bg-red-600
                     transition-all duration-200 text-sm shadow-sm mb-3">
        <i class="fas fa-right-from-bracket mr-2"></i> Oui, me déconnecter
      </button>
    </form>

    <a href="{% url 'dashboard:index' %}"
       class="block w-full py-2.5 border border-gray-200 text-gray-600 font-medium rounded-xl
              hover:bg-gray-50 transition-all duration-200 text-sm">
      Annuler
    </a>
  </div>

  <p class="text-center text-xs text-gray-400 mt-6">
    © 2026 FinTrack CRM · Tous droits réservés
  </p>
</div>
</body>
</html>
