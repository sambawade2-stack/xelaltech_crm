version: '3.9'

# ─── Déploiement Dokploy ─────────────────────────────────────────────────────
# La base de données PostgreSQL est provisionnée par Dokploy (DATABASE_URL).
# Dokploy + Traefik gèrent le reverse proxy et le SSL.
# ─────────────────────────────────────────────────────────────────────────────

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  celery:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  redis_data:
  media_files:
